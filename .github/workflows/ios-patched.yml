name: Build patched iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout olcbox
        uses: actions/checkout@v6
        with:
          path: olcbox

      - name: Checkout olcrtc
        uses: actions/checkout@v6
        with:
          repository: openlibrecommunity/olcrtc
          ref: master
          path: olcrtc
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '^26.0'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: olcrtc/go.sum

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Go mobile tooling
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install golang.org/x/mobile/cmd/gomobile@latest

      - name: Initialize gomobile
        working-directory: olcrtc
        run: |
          gomobile init

      - name: Fix Gradle permissions
        working-directory: olcbox
        run: |
          chmod +x gradlew

      - name: Build unsigned iOS app
        working-directory: olcbox
        run: |
          export OLCRTC_REPO="${GITHUB_WORKSPACE}/olcrtc"
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/ios-ipa/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        working-directory: olcbox
        run: |
          app_path="build/ios-ipa/DerivedData/Build/Products/Release-iphoneos/iosApp.app"
          if [ ! -d "$app_path" ]; then
            echo "iOS app product was not found at $app_path" >&2
            exit 1
          fi

          rm -rf build/ios-ipa/package dist
          mkdir -p build/ios-ipa/package/Payload dist
          cp -R "$app_path" build/ios-ipa/package/Payload/
          (cd build/ios-ipa/package && zip -qry "${GITHUB_WORKSPACE}/olcbox/dist/Olcbox-patched-ios-unsigned.ipa" Payload)
          unzip -t "dist/Olcbox-patched-ios-unsigned.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: Olcbox-patched-ios-unsigned-ipa
          path: olcbox/dist/Olcbox-patched-ios-unsigned.ipa
